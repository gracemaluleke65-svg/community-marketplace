{% extends "base.html" %}

{% block title %}Server Error - Community Market{% endblock %}

{% block content %}
<div class="container-fluid py-5 wow fadeInUp" data-wow-delay="0.1s">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 text-center">
                <div class="bg-light rounded p-5 wow zoomIn" data-wow-delay="0.3s">
                    <i class="fa fa-exclamation-triangle fa-4x mb-4 text-danger"></i>
                    <h1 class="display-1 fw-bold text-danger">500</h1>
                    <h2 class="mb-3">Internal Server Error</h2>
                    <p class="text-muted mb-2">Something went wrong on our end. Please try again later.</p>
                    <p class="text-muted small mb-4">Our team has been notified and is working on a fix.</p>
                    <div class="d-flex justify-content-center gap-3 flex-wrap">
                        <a href="{{ url_for('index') }}" class="btn btn-primary rounded-pill px-4 py-2">
                            <i class="fa fa-home me-2"></i> Go Home
                        </a>
                        <a href="javascript:location.reload()" class="btn btn-outline-secondary rounded-pill px-4 py-2">
                            <i class="fa fa-sync-alt me-2"></i> Try Again
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
