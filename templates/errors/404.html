{% extends "base.html" %}

{% block title %}Page Not Found - Community Market{% endblock %}

{% block content %}
<div class="container-fluid py-5 wow fadeInUp" data-wow-delay="0.1s">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 text-center">
                <div class="bg-light rounded p-5 wow zoomIn" data-wow-delay="0.3s">
                    <i class="fa fa-search fa-4x mb-4 text-primary"></i>
                    <h1 class="display-1 fw-bold text-primary">404</h1>
                    <h2 class="mb-3">Page Not Found</h2>
                    <p class="text-muted mb-4">Oops! The page you're looking for doesn't exist or has been moved.</p>
                    <div class="d-flex justify-content-center gap-3 flex-wrap">
                        <a href="{{ url_for('index') }}" class="btn btn-primary rounded-pill px-4 py-2">
                            <i class="fa fa-home me-2"></i> Go Home
                        </a>
                        <a href="{{ url_for('products') }}" class="btn btn-outline-secondary rounded-pill px-4 py-2">
                            <i class="fa fa-store me-2"></i> Browse Products
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
