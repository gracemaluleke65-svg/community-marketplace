{% extends "base.html" %}

{% block title %}Access Denied - Community Market{% endblock %}

{% block content %}
<div class="container-fluid py-5 wow fadeInUp" data-wow-delay="0.1s">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 text-center">
                <div class="bg-light rounded p-5 wow zoomIn" data-wow-delay="0.3s">
                    <i class="fa fa-lock fa-4x mb-4 text-warning"></i>
                    <h1 class="display-1 fw-bold text-warning">403</h1>
                    <h2 class="mb-3">Access Denied</h2>
                    <p class="text-muted mb-4">You don't have permission to access this page.</p>
                    <div class="d-flex justify-content-center gap-3 flex-wrap">
                        <a href="{{ url_for('index') }}" class="btn btn-primary rounded-pill px-4 py-2">
                            <i class="fa fa-home me-2"></i> Go Home
                        </a>
                        {% if current_user.is_authenticated %}
                            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary rounded-pill px-4 py-2">
                                <i class="fa fa-tachometer-alt me-2"></i> My Dashboard
                            </a>
                        {% else %}
                            <a href="{{ url_for('login') }}" class="btn btn-outline-secondary rounded-pill px-4 py-2">
                                <i class="fa fa-sign-in-alt me-2"></i> Login
                            </a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
